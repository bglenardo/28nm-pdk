instruments:
  keithley_2400:
    type: Keithley2400
    port: COM7
    quantity: Vd
    baudrate: 9600
    timeout_s: 1.0
    bytesize: 8
    parity: "N"
    stopbits: 1
    read_termination: "\r"
    write_termination: "\r"
    current_compliance_a: 0.01
    init_commands:
      - "*RST"
      - ":SOUR:FUNC VOLT"
      - ":SENS:FUNC \"CURR\""
      - ":SENS:CURR:PROT 0.01"
      - ":SENS:CURR:RANG:AUTO ON"
      - ":SYST:RSEN ON"
      - ":TRIG:COUN 1"
      - ":FORM:ELEM CURR"

  keithley_e3631a_a:
    type: E3631A
    port: COM5
    baudrate: 9600
    timeout_s: 1.0
    channel_map:
      P6V: Vb
      P25V: Vg
      N25V: None

  keithley_e3631a_b:
    type: E3631A
    port: COM10
    baudrate: 9600
    timeout_s: 1.0
    channel_map:
      P6V: 0.9V
      P25V: 1.8V
      N25V: None

  bk_9132c:
    type: 9132C
    port: COM6
    baudrate: 9600
    timeout_s: 1.0
    bytesize: 8
    parity: "N"
    stopbits: 1
    write_termination: "\r\n"
    read_termination: "\n"
    set_voltage_cmd: "APPL {channel}, {value:.6f}, {current_limit_a:.6f}"
    current_limit_a: 0.1
    channel_map:
      CH1: vgxp
      CH2: None
      CH3: vgxn

